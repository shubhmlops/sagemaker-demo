version: 0.2

phases:

  install:
    runtime-versions:
      python: 3.10
    commands:
      - echo "==> Installing dependencies..."
      - pip install --upgrade pip
      - pip install --no-cache-dir awscli sagemaker==2.224.0 scikit-learn==1.2.2 boto3 pandas
      # - pip install snowflake-connector-python
      # - pip install -r requirements.txt

  build:
    commands:
      # - |
      #   if [ -f "data.csv" ]; then
      #     echo "==> data.csv found, uploading to S3..."
      #     aws s3 cp data.csv s3://${S3_BUCKET}/${INPUT_DATA_KEY:-data/data.csv}
      #     echo "==> Upload complete."
      #   else
      #     echo "==> data.csv not found, skipping upload."
      #   fi
      - echo "Starting SageMaker pipeline..."
      - python pipeline.py

  post_build:
