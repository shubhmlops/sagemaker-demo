version: 0.2

env:
  variables:
    PIPELINE_NAME: "MyMLPipeline"
    INPUT_DATA_KEY: "blend-sagemaker-demo/data/data.csv"
    ACCURACY_THRESHOLD: "0.80"
    MODEL_APPROVAL_STATUS: "PendingManualApproval"

phases:

  install:
    runtime-versions:
      python: 3.10   # safer than 3.11 in CodeBuild
    commands:
      - echo "==> Installing dependencies..."
      - pip install --upgrade pip
      - pip install awscli sagemaker==2.224.0 scikit-learn==1.2.2 boto3 pandas

  pre_build:
    commands:
      - echo "==> Validating environment..."

      - if [ -z "$SAGEMAKER_ROLE_ARN" ]; then echo "ERROR: SAGEMAKER_ROLE_ARN is not set"; exit 1; fi
      - if [ -z "$S3_BUCKET" ]; then echo "ERROR: S3_BUCKET is not set"; exit 1; fi

      - echo "Pipeline name  : $PIPELINE_NAME"
      - echo "S3 bucket      : $S3_BUCKET"
      - echo "Region         : $AWS_DEFAULT_REGION"

  build:
    commands:
      - echo "==> Uploading data.csv to S3..."
      - if [ -f data.csv ]; then aws s3 cp data.csv s3://$S3_BUCKET/$INPUT_DATA_KEY; else echo "WARNING: data.csv not found, skipping upload"; fi

      - echo "==> Running pipeline script..."
      - python pipeline.py

  post_build:
    commands:
      - echo "==> Build complete ✓"

artifacts:
  files:
    - "**/*"
  name: sagemaker-pipeline-artifact